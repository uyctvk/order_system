<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>注文完了</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="mobile-body">
  <main class="mobile-main">
    <section class="mobile-card center">
      <h1>注文を受け付けました</h1>
      <p>テーブル{{ receipt.table_no }}</p>
      <p>レシート番号 {{ receipt.receipt_no }}</p>

      <div class="order-summary">
        {% for item in items %}
          <div class="summary-row">
            <span>{{ item.product_name }} × {{ item.quantity }}</span>
            <strong>{{ "{:,}".format(item.line_total) }}円</strong>
          </div>
        {% endfor %}
      </div>

      <div class="total-box mobile-total">
        今回注文：{{ "{:,}".format(order.total_amount) }}円<br>
        現在小計：{{ "{:,}".format(subtotal) }}円
      </div>

      <a class="back-order" href="{{ url_for('mobile_order', token=receipt.token) }}">追加注文する</a>
    </section>
  </main>
</body>
</html>
